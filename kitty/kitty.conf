font_family SauceCodePro Nerd Font

font_size 18.0
background_opacity 0.8

scrollback_lines 10000
scrollback_fill_enlarged_window yes
wheel_scroll_multiplier 5.0
touch_scroll_multiplier 5.0

map ctrl+c copy_and_clear_or_interrupt
map ctrl+v paste_from_clipboard

# map ctrl+page_up scroll_page_up
# map ctrl+page_down scroll_page_down
map ctrl+home scroll_home
map ctrl+end scroll_end
map ctrl+down scroll_line_down
map ctrl+up scroll_line_up
map ctrl+page_down remote_control scroll-window 0.5p
map ctrl+page_up remote_control scroll-window 0.5p-

map ctrl+plus change_font_size current +1.0
map ctrl+= change_font_size current 0
map ctrl+minus change_font_size current -1.0


# BEGIN_KITTY_THEME
# Default
include current-theme.conf
# END_KITTY_THEME
